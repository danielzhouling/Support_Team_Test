<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建考核 - Step1 - Dmall Helpdesk 技能评估系统</title>
    <link rel="stylesheet" href="../shared/css/theme.css">
    <style>
        :root { --sidebar-width: 240px; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-logo { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo h1 { font-size: 16px; font-weight: 600; }
        .sidebar-logo p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; padding: 0 20px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 14px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(79, 70, 229, 0.3); color: white; border-right: 3px solid var(--color-primary); }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-primary); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
        .user-details { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-role { font-size: 12px; color: rgba(255,255,255,0.5); }
        .main { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; }
        .page-header { background: white; border-bottom: 1px solid var(--color-gray-200); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .page-title { font-size: 18px; font-weight: 600; color: var(--color-gray-900); }
        .page-content { flex: 1; padding: 24px; }
        /* 步骤条 */
        .step-bar { background: white; border-radius: var(--radius-lg); padding: 24px 32px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; }
        .step-item { display: flex; align-items: center; gap: 8px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
        .step-num.active { background: var(--color-primary); color: white; }
        .step-num.done { background: var(--color-success); color: white; }
        .step-num.pending { background: var(--color-gray-200); color: var(--color-gray-500); }
        .step-label { font-size: 14px; font-weight: 500; }
        .step-label.active { color: var(--color-primary); }
        .step-label.done { color: var(--color-success); }
        .step-label.pending { color: var(--color-gray-400); }
        .step-line { width: 80px; height: 2px; background: var(--color-gray-200); margin: 0 16px; }
        .step-line.done { background: var(--color-success); }
        /* 表单卡片 */
        .form-card { background: white; border-radius: var(--radius-lg); padding: 32px; max-width: 600px; margin: 0 auto; }
        .form-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--color-gray-900); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--color-gray-700); margin-bottom: 8px; }
        .form-label .required { color: var(--color-danger); }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 0 12px; font-size: 14px; border: 1px solid var(--color-gray-300); border-radius: var(--radius-md); background: white; }
        .form-input { height: 44px; }
        .form-textarea { height: 100px; padding: 10px 12px; resize: vertical; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .form-hint { font-size: 12px; color: var(--color-gray-400); margin-top: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-actions { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--color-gray-200); }
        .btn { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 24px; font-size: 14px; font-weight: 500; border: none; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background-color: var(--color-primary); color: white; }
        .btn-primary:hover { background-color: var(--color-primary-dark); }
        .btn-secondary { background-color: var(--color-gray-100); color: var(--color-gray-700); }
        .btn-secondary:hover { background-color: var(--color-gray-200); }
        .btn-link { background: none; border: none; color: var(--color-gray-500); cursor: pointer; }
        .btn-link:hover { color: var(--color-gray-700); }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; background: var(--color-gray-800); color: white; border-radius: var(--radius-md); font-size: 14px; z-index: 2000; opacity: 0; transform: translateY(-10px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--color-success); }
        .toast.error { background: var(--color-danger); }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>技能评估系统</h1><p>管理端</p></div>
            <nav class="sidebar-nav">
                <div class="nav-section"><div class="nav-section-title">账号管理</div><div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg><span>员工列表</span></div></div>
                <div class="nav-section"><div class="nav-section-title">题库管理</div><div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><span>题目列表</span></div></div>
                <div class="nav-section">
                    <div class="nav-section-title">考核管理</div>
                    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg><span>创建考核</span></div>
                    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><span>考核监控</span></div>
                    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg><span>批阅管理</span></div>
                    <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg><span>成绩发布</span></div></div>
                <div class="nav-section"><div class="nav-section-title">数据报表</div><div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg><span>数据看板</span></div></div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar">A</div><div class="user-details"><div class="user-name">管理员</div><div class="user-role">Admin</div></div></div>
            </div>
        </aside>

        <main class="main">
            <header class="page-header">
                <h1 class="page-title">创建考核</h1>
            </header>
            <div class="page-content">
                <!-- 步骤条 -->
                <div class="step-bar">
                    <div class="step-item">
                        <div class="step-num active">1</div>
                        <span class="step-label active">基本信息</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-item">
                        <div class="step-num pending">2</div>
                        <span class="step-label pending">选择题目</span>
                    </div>
                    <div class="step-line"></div>
                    <div class="step-item">
                        <div class="step-num pending">3</div>
                        <span class="step-label pending">发布设置</span>
                    </div>
                </div>

                <!-- 表单 -->
                <div class="form-card">
                    <h2 class="form-title">考核基本信息</h2>
                    <form id="examForm">
                        <div class="form-group">
                            <label class="form-label">考核名称 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="examName" placeholder="如：Linux运维月度考核" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">考核说明</label>
                            <textarea class="form-textarea" id="examDesc" placeholder="请输入考核说明，包括考核目的、注意事项等"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">及格分数 <span class="required">*</span></label>
                                <input type="number" class="form-input" id="passScore" value="70" min="0" max="100" required>
                                <div class="form-hint">满分100分，默认及格线70分</div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">答题时长 <span class="required">*</span></label>
                                <input type="number" class="form-input" id="duration" value="30" min="1" max="300" required>
                                <div class="form-hint">单位：分钟，默认30分钟</div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">截止时间</label>
                            <input type="datetime-local" class="form-input" id="deadline">
                            <div class="form-hint">不设置则表示无截止时间</div>
                        </div>
                    </form>
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="handleSaveDraft()">保存草稿</button>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-link" onclick="handleCancel()">取消</button>
                            <button class="btn btn-primary" onclick="handleNext()">下一步</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../shared/js/utils.js"></script>
    <script>
        let examData = JSON.parse(sessionStorage.getItem('examDraft') || '{}');

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadDraft() {
            if (examData.step1) {
                document.getElementById('examName').value = examData.step1.examName || '';
                document.getElementById('examDesc').value = examData.step1.examDesc || '';
                document.getElementById('passScore').value = examData.step1.passScore || 70;
                document.getElementById('duration').value = examData.step1.duration || 30;
                document.getElementById('deadline').value = examData.step1.deadline || '';
            }
        }

        function saveDraft() {
            examData.step1 = {
                examName: document.getElementById('examName').value,
                examDesc: document.getElementById('examDesc').value,
                passScore: document.getElementById('passScore').value,
                duration: document.getElementById('duration').value,
                deadline: document.getElementById('deadline').value
            };
            sessionStorage.setItem('examDraft', JSON.stringify(examData));
        }

        function handleSaveDraft() {
            saveDraft();
            showToast('草稿已保存');
        }

        function handleNext() {
            const examName = document.getElementById('examName').value.trim();
            const passScore = document.getElementById('passScore').value;
            const duration = document.getElementById('duration').value;

            if (!examName) { showToast('请输入考核名称', 'error'); return; }
            if (!passScore || passScore < 0 || passScore > 100) { showToast('请输入有效的及格分数', 'error'); return; }
            if (!duration || duration < 1) { showToast('请输入有效的答题时长', 'error'); return; }

            saveDraft();
            window.location.href = 'exam-create-step2.html';
        }

        function handleCancel() {
            if (confirm('确定要取消创建考核吗？未保存的内容将丢失。')) {
                sessionStorage.removeItem('examDraft');
                window.location.href = 'employee-list.html';
            }
        }

        loadDraft();
    </script>
</body>
</html>
