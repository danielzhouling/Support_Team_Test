<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交卷确认 - Dmall Helpdesk 技能评估系统</title>
    <link rel="stylesheet" href="../shared/css/theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 380px; text-align: center; }
        .icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(102,126,234,0.1); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
        .icon svg { color: #667eea; }
        h1 { font-size: 20px; color: #1f2937; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
        .stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .stat-value.unanswered { color: #f59e0b; }
        .unanswered-list { background: #fef3c7; border-radius: 10px; padding: 14px; margin-bottom: 20px; text-align: left; }
        .unanswered-title { font-size: 13px; font-weight: 600; color: #92400e; margin-bottom: 8px; }
        .unanswered-items { display: flex; flex-wrap: wrap; gap: 6px; }
        .unanswered-item { background: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; color: #92400e; }
        .btn { width: 100%; height: 48px; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f3f4f6; color: #6b7280; }
        .tips { margin-top: 16px; font-size: 12px; color: #9ca3af; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>答案已提交</h1>
        <p class="subtitle">您的答案已成功保存</p>

        <div class="stats">
            <div class="stat"><div class="stat-value" id="answeredCount">8</div><div class="stat-label">已答</div></div>
            <div class="stat"><div class="stat-value unanswered" id="unansweredCount">2</div><div class="stat-label">未答</div></div>
            <div class="stat"><div class="stat-value">10</div><div class="stat-label">总题数</div></div>
        </div>

        <div class="unanswered-list" id="unansweredList" style="display: none;">
            <div class="unanswered-title">未答题目</div>
            <div class="unanswered-items" id="unansweredItems"></div>
        </div>

        <button class="btn btn-secondary" onclick="handleContinue()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            继续答题
        </button>
        <button class="btn btn-primary" onclick="handleConfirm()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            确认交卷
        </button>

        <p class="tips">交卷后无法修改答案，请确认所有题目已完成后再提交。</p>
    </div>

    <script src="../shared/js/utils.js"></script>
    <script>
        const answers = JSON.parse(sessionStorage.getItem('examAnswers') || '[]');
        const unanswered = answers.map((a, i) => a === null ? i + 1 : null).filter(x => x !== null);
        const answeredCount = answers.filter(a => a !== null).length;
        const unansweredCount = unanswered.length;

        document.getElementById('answeredCount').textContent = answeredCount;
        document.getElementById('unansweredCount').textContent = unansweredCount;

        if (unansweredCount > 0) {
            document.getElementById('unansweredList').style.display = 'block';
            document.getElementById('unansweredItems').innerHTML = unanswered.map(n => `<span class="unanswered-item">第${n}题</span>`).join('');
        }

        function handleContinue() {
            history.back();
        }

        function handleConfirm() {
            sessionStorage.removeItem('examAnswers');
            sessionStorage.removeItem('examMarked');
            location.href = 'exam-result.html';
        }
    </script>
</body>
</html>
